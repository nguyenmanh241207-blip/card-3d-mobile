<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 3D Card - Smooth Rotation</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            perspective: 1200px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 320px;
            height: 200px;
            background: #1a1a1a;
            border-radius: 16px;
            position: relative;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            /* Không dùng transition ở đây để tránh bị giật khi JS can thiệp */
            will-change: transform; 
        }

        /* Viền sáng neon */
        .card::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe);
            background-size: 200%;
            border-radius: 18px;
            z-index: -1;
            opacity: 0.4;
        }

        .content {
            transform: translateZ(40px);
            text-align: center;
            pointer-events: none;
        }

        h2 { font-size: 1.4rem; letter-spacing: 3px; margin: 0; color: #4facfe; }
        p { font-size: 0.8rem; opacity: 0.6; margin-top: 10px; }

    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="card">
            <div class="content">
                <h2>PREMIUM CARD</h2>
                <p>Vuốt mạnh để xoay vòng tròn<br>Tự động chạy sau 3s im lặng</p>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        
        let targetRotateY = 0;
        let currentRotateY = 0;
        let lastMouseX = 0;
        let isDragging = false;
        let autoRotateActive = true;
        let lastInteractTime = Date.now();

        // 1. Vòng lặp hoạt ảnh (Mượt hơn setInterval)
        function update() {
            const now = Date.now();
            
            // Kiểm tra thời gian nghỉ để bật lại tự động xoay
            if (!isDragging && now - lastInteractTime > 3000) {
                autoRotateActive = true;
            }

            if (autoRotateActive && !isDragging) {
                targetRotateY += 0.8; // Tốc độ tự quay
            }

            // Nội suy (Lerp) giúp chuyển động mượt, không bị khựng
            currentRotateY += (targetRotateY - currentRotateY) * 0.1;
            
            card.style.transform = `rotateY(${currentRotateY}deg) rotateX(5deg)`;

            requestAnimationFrame(update);
        }

        // 2. Xử lý tương tác (Vuốt cùng chiều tay)
        function onStart(e) {
            isDragging = true;
            autoRotateActive = false;
            lastInteractTime = now = Date.now();
            lastMouseX = e.touches ? e.touches[0].clientX : e.clientX;
        }

        function onMove(e) {
            if (!isDragging) return;
            
            const currentX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = currentX - lastMouseX;
            
            // Cộng dồn góc xoay theo hướng di chuyển của tay
            // Giảm chia (ví dụ / 2) để nhạy hơn hoặc tăng để đầm hơn
            targetRotateY += deltaX * 0.5; 
            
            lastMouseX = currentX;
            lastInteractTime = Date.now();
        }

        function onEnd() {
            isDragging = false;
        }

        // Sự kiện chuột
        window.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        // Sự kiện điện thoại
        window.addEventListener('touchstart', onStart);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend', onEnd);

        // Chạy vòng lặp
        update();
    </script>
</body>
</html>
