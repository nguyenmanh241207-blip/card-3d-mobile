<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card Mirror Effect</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            perspective: 1200px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 340px;
            height: 210px;
            border-radius: 16px;
            position: relative;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Đẩy chữ xuống dưới */
            padding: 20px;
            color: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            will-change: transform;
            
            /* CHÈN ẢNH THẺ TẠI ĐÂY */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Lớp phủ hiệu ứng ánh sáng (Light Reflection) */
        .shine {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0) 45%,
                rgba(255,255,255,0.2) 50%,
                rgba(255,255,255,0) 55%,
                rgba(255,255,255,0) 100%
            );
            background-size: 250% 250%;
            z-index: 2;
            pointer-events: none;
        }

        /* Lớp phủ tối để text rõ hơn */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 3;
            transform: translateZ(50px);
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.2rem; margin: 0; letter-spacing: 2px; }
        p { font-size: 0.7rem; opacity: 0.8; margin: 5px 0 0; }

    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="card">
            <div class="shine" id="shine"></div>
            <div class="overlay"></div>
            <div class="content">
                <h2>PREMIUM MEMBER</h2>
                <p>NID: 241207-BLIP</p>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const shine = document.getElementById('shine');
        
        let targetRotateY = 0;
        let currentRotateY = 0;
        let lastX = 0;
        let isDragging = false;
        let autoRotate = true;
        let lastTime = Date.now();

        function update() {
            const now = Date.now();
            
            if (!isDragging && now - lastTime > 3000) {
                autoRotate = true;
            }

            if (autoRotate && !isDragging) {
                targetRotateY += 0.6; 
            }

            // Lerp mượt mà
            currentRotateY += (targetRotateY - currentRotateY) * 0.1;
            
            card.style.transform = `rotateY(${currentRotateY}deg) rotateX(10deg)`;

            // Cập nhật vị trí ánh sáng dựa trên góc quay
            // Khi thẻ quay, vệt sáng sẽ chạy ngang bề mặt
            const shinePos = (currentRotateY % 360) / 1.5; 
            shine.style.backgroundPosition = `${shinePos}%`;

            requestAnimationFrame(update);
        }

        function onStart(e) {
            isDragging = true;
            autoRotate = false;
            lastTime = Date.now();
            lastX = e.touches ? e.touches[0].clientX : e.clientX;
        }

        function onMove(e) {
            if (!isDragging) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = x - lastX;
            
            targetRotateY += deltaX * 0.6; // Vuốt cùng chiều tay
            
            lastX = x;
            lastTime = Date.now();
        }

        function onEnd() { isDragging = false; }

        window.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchstart', onStart);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend', onEnd);

        update();
    </script>
</body>
</html>
