<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card: Auto-Rotate & Interact</title>
    <style>
        :root {
            --glitch-rainbow: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            --bg-clr: #111;
            --card-bg: #222;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-clr);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Ngăn trình duyệt cuộn trang */
        }

        .container {
            perspective: 1500px;
        }

        /* Yêu cầu 1: Card chuyển thành card ngang (width > height) */
        .card {
            width: 320px;
            height: 200px;
            background: var(--card-bg);
            border-radius: 15px;
            position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
            
            /* Logic chuyển động: mượt mà khi tương tác, 
               nhưng khi tự xoay chúng ta sẽ điều khiển qua JS */
            transition: transform 0.1s ease-out; 
        }

        /* Yêu cầu 4: Bo góc mượt và hiệu ứng viền cho điện thoại */
        .card-border {
            position: absolute;
            inset: -2px;
            background: var(--glitch-rainbow);
            background-size: 200%;
            border-radius: 17px;
            z-index: -1;
            filter: blur(5px);
            opacity: 0.6;
            animation: moveGradient 3s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Các thành phần Parallax bên trong */
        .card-content {
            transform: translateZ(50px); /* Nổi lên cao nhất */
            text-align: center;
            padding: 20px;
        }

        h2 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        p { opacity: 0.7; font-size: 0.8rem; line-height: 1.4; margin: 10px 0; }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: white;
            color: black;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            transform: translateZ(30px); /* Nổi vừa phải */
            transition: background 0.3s;
        }
        .btn:hover { background: #ff0000; color: white; }

    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="card">
            <div class="card-border"></div>
            <div class="card-content">
                <h2>WEB 3D CARD</h2>
                <p>Tự xoay. Tương tác mượt mà.<br>Dừng xoay khi chạm, chạy tiếp sau 3 giây.</p>
                <a href="#" class="btn">KHÁM PHÁ</a>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const container = document.querySelector('.container');
        
        let autoRotateTimer;
        let isInteracting = false;
        let rotateAngle = 0; // Trạng thái góc xoay tự động

        // --- Yêu cầu 2: Card tự động xoay ---
        function startAutoRotate() {
            if (isInteracting) return;
            card.style.transition = 'transform 0.1s linear'; // Xoay linear cho mượt
            autoRotateTimer = setInterval(() => {
                rotateAngle += 0.5; // Tốc độ xoay
                if (rotateAngle >= 360) rotateAngle = 0;
                card.style.transform = `rotateY(${rotateAngle}deg)`;
            }, 20); // 50 frame/s
        }

        function stopAutoRotate() {
            clearInterval(autoRotateTimer);
            // Giữ nguyên góc xoay hiện tại để khi tương tác không bị giật
            card.style.transition = 'transform 0.1s ease-out';
        }

        // --- Yêu cầu 3 & 4: Tương tác trên điện thoại ---
        function handleMove(e) {
            isInteracting = true;
            stopAutoRotate(); // Dừng tự xoay khi có tương tác

            let clientX, clientY;
            if (e.type === 'touchmove') {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const rect = card.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // Giới hạn góc nghiêng để card không bị lật úp
            const rotateX = Math.max(-15, Math.min(15, (centerY - y) / 5));
            const rotateY = Math.max(-20, Math.min(20, (x - centerX) / 5));

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        // Khi kết thúc tương tác
        function handleEnd() {
            isInteracting = false;
            card.style.transform = `rotateX(0deg) rotateY(0deg)`; // Reset góc nghiêng
            card.style.transition = 'transform 0.5s ease'; // Hiệu ứng trả về mượt

            // Chờ 3 giây trước khi tự xoay tiếp
            setTimeout(() => {
                if (!isInteracting) {
                    // Reset lại góc xoay tự động từ 0 hoặc giữ góc hiện tại
                    rotateAngle = 0; 
                    startAutoRotate();
                }
            }, 3000); 
        }

        function handleStart() {
            isInteracting = true;
            stopAutoRotate();
            card.style.transition = 'none'; // Tương tác tức thì
        }

        // --- Gắn sự kiện ---
        // Cho máy tính
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseleave', handleEnd);
        
        // Cho điện thoại (Touch)
        document.addEventListener('touchstart', handleStart);
        document.addEventListener('touchmove', handleMove);
        document.addEventListener('touchend', handleEnd);

        // Khởi chạy
        startAutoRotate();

    </script>
</body>
</html>
